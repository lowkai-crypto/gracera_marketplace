name: Deploy to Coolify

on:
  push:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      designs: ${{ steps.filter.outputs.designs }}
      web: ${{ steps.filter.outputs.web }}
      ai-service: ${{ steps.filter.outputs.ai-service }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            designs:
              - 'designs/**'
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
            ai-service:
              - 'apps/ai-service/**'

  deploy-designs:
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.designs == 'true'
    steps:
      - name: Deploy gracera-designs
        run: |
          curl -fsSL -X POST "https://coolify.skystarcloud.com/api/v1/applications/mff3hw9yg8pzx10dimxpgn29/restart" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}"

  deploy-web:
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.web == 'true'
    steps:
      - name: Deploy gracera-web
        run: |
          curl -fsSL -X POST "https://coolify.skystarcloud.com/api/v1/applications/t11s5jxfxqzq1vbtv1qllvmd/restart" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}"

  deploy-ai-service:
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.ai-service == 'true'
    steps:
      - name: Deploy gracera-ai-service
        run: |
          curl -fsSL -X POST "https://coolify.skystarcloud.com/api/v1/applications/vq6mn522jtzg2f1800ay6364/restart" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}"
